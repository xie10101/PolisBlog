name: Test

on: 
  push:
    branches:
      - main
      - dev


jobs:
# 工作的名称 
  test:
    runs-on: ubuntu-latest
# 运行器 

# 运行的各个步骤 
    steps:
    # 单个行为的名称 
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Tests
        run: pnpm test